# GoReleaser config — https://goreleaser.com
# Cross-compiles strok and attaches archives to the GitHub release on tag push.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: strok
    main: ./cmd/strok
    binary: strok
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: strok
    formats: [tar.gz]
    # Use zip on Windows.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
